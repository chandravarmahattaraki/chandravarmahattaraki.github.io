        /* General Styles */
        body {

        a {

       /* Navbar Styles */
        .navbar {
                background-color: #000000;
                padding: 15px 40px;

                display: flex;
                align-items: center;
                justify-content: space-between;

                position: sticky;
                top: 0;

        /* Hamburger Menu Styles */
        /* TOP MENU */

            .top-menu {

                background: rgba(255,255,255,0.08);

                backdrop-filter: blur(12px);

                border: 1px solid rgba(255,255,255,0.1);

                border-radius: 60px;

                padding: 18px 50px;

                display: flex;
                align-items: center;
                justify-content: center;

                gap: 50px;

                margin-left: auto;
                margin-right: auto;

                min-width: 650px;

                box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            }

            /* MENU LINKS */

            .top-menu a {

                color: white;

                font-size: 18px;

                font-weight: 500;

                transition: 0.3s ease;

                position: relative;

                white-space: nowrap;
            }

            /* HOVER EFFECT */

            .top-menu a:hover {
                color: #00bfff;
            }

            /* UNDERLINE EFFECT */

            .top-menu a::after {

                content: "";

                position: absolute;

                left: 0;

                bottom: -6px;

                width: 0%;

                height: 2px;

                background: #00bfff;

                transition: 0.3s;
            }

            .top-menu a:hover::after {
                width: 100%;
            }
       
            /* CLOCK */

            #clock {

                color: white;

                font-size: 16px;

                font-weight: bold;

                min-width: 90px;

                text-align: right;
            }
        
        /* =========================
            RESPONSIVE NAVBAR
            ========================= */

            @media screen and (max-width: 900px) {

                .navbar {

                    gap: 20px;
                }

                .top-menu {

                    min-width: auto;

                    width: 100%;

                    flex-wrap: wrap;

                    justify-content: center;

                    gap: 20px;

                    padding: 15px 20px;
                }

                #clock {

                    text-align: center;
                }
            }
        
        /* Hero Section */ 
        .hero {
            background-color: rgb(29, 15, 15);
            width: 100%; /* Full width */
            height: 30vh; /* Full viewport height */
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: auto;
            object-fit: cover; /* Ensures the image covers the full container */

        }

        /* Middle Section css code */
        /* Middle Section css code */
        .middle-section {
            position: relative;
            width: 100%; /* Use 100% to ensure it spans the full width */
            height: 700px;
            overflow: hidden;
            display: flex;
            align-items: center; /* Center content vertically */
            color: white;
        }

        .middle-section video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 190%;
            object-fit: cover;
            z-index: 0; /* Ensure video is behind the overlay content */
        }

        .overlay-content {
            position: relative;
            z-index: 2; /* Ensure overlay content is above the video */
            color: white;
            text-align: left; /* Align text to the left */
            max-width: 600px;
            padding: 50px;
            margin-left: 20px; /* Add left margin to align content to the left */

        .overlay-content h1 {

            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            max-width: 300px;
        }

        .contact-form button {
            padding: 10px 20px;
            background-color: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;

        .social-media-icons {

        @media screen and (max-width: 600px) {

            }

                flex-wrap: wrap;
                gap: 10px;
            }
        }
        
        /* Footer */
        .footer {

            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 150px;
        }
        
    </style>

    <!-- =========================
         CLOCK SCRIPT
    ========================== -->

    <script>

        function updateClock() {

            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("clock").textContent =
                `${hours}:${minutes}:${seconds}`;
        }

        setInterval(updateClock, 1000);

        updateClock();

    </script>
